# AGIOS Builder Router — caller for motivational-quote-site-v2
# Thin wrapper around the reusable workflow in msarmento42/agios-control.
# All real routing logic lives there; do not duplicate the job body here.
name: AGIOS Builder Router (caller)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        required: true
      builder_order:
        required: false
        default: ""
  issues:
    types: [labeled]

jobs:
  route:
    if: >-
      github.event_name != 'issues' ||
      github.event.label.name == 'agios:ready-for-codex'
    uses: msarmento42/agios-control/.github/workflows/agios-builder-router.yml@main
    with:
      issue_number: ${{ inputs.issue_number || github.event.issue.number }}
      builder_order: ${{ inputs.builder_order || '' }}
      frontend_path: ""
      builder_timeout_seconds: 120
      job_timeout_minutes: 25
    secrets: inherit
